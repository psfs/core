services:
  php:
    image: c15k02k18/php:8.3-alpine${DEBUG:-}
    pull_policy: always
    restart: always
    tty: true
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/php.ini
    networks:
      - psfs-network
    working_dir: "/var/www"
    ports:
      - "${HOST_PORT:-8001}:8080"
    command: 'php -S 0.0.0.0:8080 -t ./html'
    environment:
      XDEBUG_CONFIG: "remote_host=localhost"
      PHP_IDE_CONFIG: "serverName=PSFSCore"
      PHP_TIMEZONE: "${PHP_TIMEZONE:-Europe/Madrid}"
      PHP_OPCACHE: "${PHP_OPCACHE:-0}"
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  php-swoole:
    image: c15k02k18/php:8.3-alpine${DEBUG:-}
    pull_policy: always
    restart: always
    tty: true
    profiles:
      - swoole
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/php.ini
    networks:
      - psfs-network
    working_dir: "/var/www"
    ports:
      - "${HOST_PORT_SWOOLE:-8011}:8080"
    command: >
      php /var/www/src/bin/psfs psfs:swoole:start
      --host=0.0.0.0
      --port=8080
      --workers=${PSFS_SWOOLE_WORKERS:-2}
      --max-request=${PSFS_SWOOLE_MAX_REQUEST:-1000}
      --pid-file=/tmp/psfs-swoole.pid
      --log-file=/tmp/psfs-swoole.log
    environment:
      XDEBUG_CONFIG: "remote_host=localhost"
      PHP_IDE_CONFIG: "serverName=PSFSCore"
      PHP_TIMEZONE: "${PHP_TIMEZONE:-Europe/Madrid}"
      PHP_OPCACHE: "${PHP_OPCACHE:-0}"
      PSFS_RUNTIME: "swoole"
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    image: valkey/valkey:latest
    networks:
      - psfs-network
    command: [
      "valkey-server",
      "--appendonly", "no",
      "--save", "",
      "--maxmemory", "256M",
      "--maxmemory-policy", "allkeys-lru"
    ]
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli ping | grep PONG" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M

  db:
    image: mysql:8.4
    networks:
      - psfs-network
    environment:
      MYSQL_USER: ${MYSQL_USER:-psfs}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-psfs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-psfs}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-psfs}
    volumes:
      - "psfs-db-data:/var/lib/mysql"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 20

networks:
  psfs-network:
    driver: bridge

volumes:
  psfs-db-data:
