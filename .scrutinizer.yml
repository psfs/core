filter:
  excluded_paths:
    - src/bin/*
    - src/command/*
    - src/tests/*
    - src/public/*
    - src/templates/*
    - locale/*
    - cache/*
    - config/*
    - logs/*
    - tests/*
    - tests_api/*
  dependency_paths:
    - vendor/

checks:
    php: true

build:
  nodes:
    analysis:
      tests:
        override:
          - php-scrutinizer-run --enable-security-analysis
    docker-tests:
      environment:
        docker:
          remote_engine: true
        variables:
          APP_ENVIRONMENT: "test"
          HOST_PORT: "8008"
          DEBUG: "-xdebug"
          PHP_OPCACHE: "0"
      tests:
        override:
          - command: |
              cat > .env <<'EOF'
              HOST_PORT=8008
              DEBUG=-xdebug
              PHP_OPCACHE=0
              EOF
              docker compose down -v --remove-orphans || true
              docker compose up -d --wait db redis php
              docker compose exec -T php sh -lc 'cd /var/www && composer install --no-interaction --no-progress'
              docker compose exec -T php sh -lc 'cd /var/www && XDEBUG_MODE=coverage vendor/bin/phpunit --configuration phpunit.xml.dist --colors=never'
              docker compose down -v --remove-orphans
            coverage:
              file: "cache/coverage/coverage.xml"
              format: "clover"
