filter:
  excluded_paths:
    - src/bin/*
    - src/command/*
    - src/tests/*
    - src/public/*
    - src/templates/*
    - locale/*
    - cache/*
    - config/*
    - logs/*
    - tests/*
    - tests_api/*
    - tools/*
  dependency_paths:
    - vendor/

checks:
    php: true

build:
  environment:
    php:
      version: "8.2"
      ini:
        memory_limit: "-1"
        xdebug.mode: coverage
  dependencies:
    override:
      - true
  project_setup:
    override:
      - true
  tests:
    override:
      - true
  nodes:
    services-tests:
      services:
        mysql: "8.4"
        redis: "6"
      environment:
        variables:
          APP_ENVIRONMENT: "test"
          API_DB_HOST: "127.0.0.1"
          API_DB_PORT: "3306"
          API_DB_NAME: "scrutinizer"
          API_DB_USER: "root"
          API_DB_PASSWORD: ""
          DB_HOST: "127.0.0.1"
          DB_PORT: "3306"
          DB_NAME: "scrutinizer"
          DB_USER: "root"
          DB_PASSWORD: ""
          PSFS_REDIS_HOST: "127.0.0.1"
          PSFS_REDIS_PORT: "6379"
          PSFS_REDIS_TIMEOUT: "1.5"
      dependencies:
        override:
          - composer install -o --no-interaction --no-progress --prefer-dist
          - php tests/bootstrap/prepare_api_mysql.php
          - php -r '$f="config/config.json"; $d=file_exists($f)?json_decode((string)file_get_contents($f),true):[]; if(!is_array($d)){$d=[];} $d["psfs.redis"]=true; $d["redis.host"]="127.0.0.1"; $d["redis.port"]=6379; $d["redis.timeout"]=1.5; $d["cache.config.ttl"]=$d["cache.config.ttl"]??60; $d["cache.reflections.ttl"]=$d["cache.reflections.ttl"]??300; file_put_contents($f, json_encode($d, JSON_PRETTY_PRINT|JSON_UNESCAPED_SLASHES));'
      project_setup:
        override:
          - true
      tests:
        stop_on_failure: true
        override:
          - command: "XDEBUG_MODE=coverage vendor/bin/phpunit --configuration phpunit.xml.dist --colors=never"
            idle_timeout: 1200
            coverage:
              file: "cache/coverage/coverage.xml"
              format: "clover"
