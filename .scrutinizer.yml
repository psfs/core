filter:
  excluded_paths:
    - src/bin/*
    - src/command/*
    - src/tests/*
    - src/public/*
    - src/templates/*
    - locale/*
    - cache/*
    - config/*
    - logs/*
    - tests/*
    - tests_api/*
  dependency_paths:
    - vendor/

checks:
    php: true

build:
  environment:
    php:
      version: "8.2.0"
  dependencies:
    override:
      - true
  project_setup:
    override:
      - true
  tests:
    override:
      - true
  nodes:
    docker-tests:
      environment:
        docker: true
        variables:
          APP_ENVIRONMENT: "test"
          HOST_PORT: "8008"
          DEBUG: "-xdebug"
          PHP_OPCACHE: "0"
      dependencies:
        override:
          - true
      project_setup:
        override:
          - true
      tests:
        stop_on_failure: true
        override:
          - command: |
              set -euo pipefail
              if command -v docker-compose >/dev/null 2>&1; then
                DC="docker-compose"
              elif docker compose version >/dev/null 2>&1; then
                DC="docker compose"
              else
                echo "No Docker Compose command found (docker-compose or docker compose)"
                exit 1
              fi
              cat > .env <<'EOF'
              HOST_PORT=8008
              DEBUG=-xdebug
              PHP_OPCACHE=0
              EOF
              trap '$DC down -v || true' EXIT
              $DC down -v || true
              $DC up -d db redis php
              for i in $(seq 1 60); do
                if $DC exec -T db mysqladmin ping -h localhost --silent >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              $DC exec -T php sh -lc 'cd /var/www && composer install --no-interaction --no-progress --prefer-dist'
              $DC exec -T php sh -lc 'cd /var/www && mkdir -p cache/coverage'
              $DC exec -T php sh -lc 'cd /var/www && XDEBUG_MODE=coverage vendor/bin/phpunit --configuration phpunit.xml.dist --coverage-clover cache/coverage/coverage.xml --colors=never'
            coverage:
              file: "cache/coverage/coverage.xml"
              format: "clover"
